<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car</title>
  </head>
  <body>
    <h1 align="center">Car Information</h1>
    <form action="" method="post">
      <label>Car Brand:</label>
      <input type="text" name="carBrand" /><br /><br />
      <label>Model Name:</label>
      <input type="text" name="modelName" /><br /><br />
      <label>Year of Manufacture:</label>
      <input type="number" name="year" /><br /><br />
      <label>Category:</label>
      <select name="category">
        <option>SUV</option>
        <option>Sedan</option>
        <option>Hatchback</option>
        <option>Sports Car</option></select
      ><br /><br />
      <label>Engine Capacity (CC):</label>
      <input type="number" name="engineCapacity" /><br /><br />
      <label>Transmission Type:</label>
      <select name="transmission">
        <option>Manual</option>
        <option>Automatic</option></select
      ><br /><br />
      <label>Fuel Type:</label>
      <select name="fuelType">
        <option>Petrol</option>
        <option>Diesel</option>
        <option>CNG</option>
        <option>Electric</option></select
      ><br /><br />
      <label>Mileage:</label>
      <input type="number" name="mileage" /><br /><br />
      <label>Color:</label>
      <input type="text" name="color" /><br /><br />
      <label>Safety Rating:</label>
      <input type="number" name="safetyRating" /><br /><br />
      <label>Price:</label>
      <input type="text" name="price" /><br /><br />
      <label>Featured Image:</label>
      <input type="file" name="image" /><br /><br />
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
